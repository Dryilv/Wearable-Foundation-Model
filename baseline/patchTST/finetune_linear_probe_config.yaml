train:
  epochs: 30
  batch_size: 32
  base_lr: 1.0e-3
  min_lr: 1.0e-6
  weight_decay: 0.01
  label_smoothing: 0.0
  use_amp: true
  mixup_alpha: 0.2
  save_dir: "./checkpoints_patchtst_linear_probe"

data:
  index_path: "train_index_cleaned.json"
  signal_len: 3000
  num_classes: 2
  num_workers: 4
  split_ratio: 0.1
  split_seed: 42
  use_sliding_window: false
  window_stride: 1500

model:
  pretrained_path: ""
  patch_len: 50
  stride: 50
  in_channels: 5
  embed_dim: 768
  depth: 12
  num_heads: 12
  d_ff: 3072
  dropout: 0.1
  cls_dropout: 0.0
  use_revin: true
  data_ratio: 1.0
