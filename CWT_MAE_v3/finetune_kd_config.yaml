train:
  epochs: 30
  batch_size: 32
  val_mode: "test"
  base_lr: 5.0e-5
  min_lr: 1.0e-6
  warmup_epochs: 5
  weight_decay: 0.05
  use_layer_wise_lr: true
  layer_decay: 0.65
  label_smoothing: 0.1
  use_focal_loss: false
  focal_gamma: 2.0
  focal_alpha: null
  focal_reduction: "mean"
  use_amp: false
  grad_clip_norm: 1.0
  find_unused_parameters: false
  allow_tf32: true
  cudnn_benchmark: true
  seed: 42
  deterministic: false
  auto_resume: true
  resume_path: null
  early_stop_patience: 0
  save_dir: "./finetune_kd"

data:
  data_root: ""
  split_file: ""
  signal_len: 3000
  num_classes: 2
  num_workers: 4
  pin_memory: true
  on_error: "raise"
  max_error_logs: 20
  clean_indices_path: null
  clean_val_indices_path: null
  clean_test_indices_path: null

model:
  pretrained_path: null
  embed_dim: 768
  depth: 12
  num_heads: 12
  cwt_scales: 64
  patch_size_time: 25
  patch_size_freq: 8
  use_diff: false
  decoder_embed_dim: 512
  decoder_depth: 8
  decoder_num_heads: 16
  use_cot: true
  num_reasoning_tokens: 16
  use_arcface: false
  arcface_s: 20.0
  arcface_m: 0.2

kd:
  teacher_checkpoint: ""
  teacher_strict: true
  student_channel_index: 1
  temperature: 2.0
  kd_weight: 1.0
  cls_weight: 1.0
  disable_train_channel_shuffle: true
  use_weighted_sampler: false
  teacher_model:
    use_arcface: false
  student_model:
    use_arcface: false
